<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetor</title>
</head>

<body>
    <script>
        let numero = []
        let media = 0
        for (let i = 0; i < 9; i++) {
            numero[i] = parseInt(prompt("Digite 2  número intero"))
            media += numero[i] / 10
        }
        console.log("a media : " + media.toFixed(2))
    </script>
</body>

</html>
