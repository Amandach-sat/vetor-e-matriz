<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         const matriz = [];
        let somaTotal = 0;

        for (let i = 0; i < 4; i++) {
            matriz[i] = [];
            for (let j = 0; j < 4; j++) {
                matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
                somaTotal += matriz[i][j] /16
            }
        }

        console.log("Matriz 4x4:");
        for (let i = 0; i < 4; i++) {
            let linha = "";
            for (let j = 0; j < 4; j++) {
                linha += matriz[i][j] + " ";
            }
            console.log(linha);
        }

        console.log("Soma total e a media atritimeticaa:", somaTotal.toFixed(2));
    </script>
    
</body>
</html>
