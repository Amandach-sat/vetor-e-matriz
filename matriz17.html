<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const matriz = [];
        let somaTotal = 0;

        for (let i = 0; i < 2; i++) {
            matriz[i] = [];
            for (let j = 0; j < 2; j++) {
                matriz[i][j] = parseInt(prompt(`Digite o elemento [${i}][${j}]:`));
                somaTotal += matriz[i][j];
            }
        }

        console.log("Matriz 2x2:");
        for (let i = 0; i < 2; i++) {
            let linha = "";
            for (let j = 0; j < 2; j++) {
                linha += matriz[i][j] + " ";
            }
            console.log(linha);
        }

        console.log("Soma total dos elementos:", somaTotal);


    </script>
</body>

</html>
