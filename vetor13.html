<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetor</title>
</head>
<body>
    <script>
       let numero = []
        let intervalo = 0
        for(let i = 0; i<10; i++){
            numero[i] = parseInt(prompt("Digite um número"))
            if(numero[i]>=10 && numero[i]<=50){
                intervalo++
            }
        }
        console.log(intervalo + " números estão entra 10 e 50")
    </script>
    
</body>
</html>
